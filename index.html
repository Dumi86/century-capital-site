<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Century Capital | Coming Soon</title>
  <meta name="description" content="South Africa's premier digital studio. We build systems, websites, and applications with precision and permanence."/>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#ffe088",
            "secondary": "#fed65b",
            "background": "#000c1e",
            "surface": "#00132b",
            "on-surface": "#e1e3e4",
            "on-surface-variant": "#c3c6cf"
          },
          fontFamily: {
            headline: ["Noto Serif", "serif"],
            body: ["Manrope", "sans-serif"],
            label: ["Manrope", "sans-serif"]
          }
        }
      }
    }
  </script>
</head>
<body class="bg-background text-on-surface font-body overflow-hidden">
  
  <div class="min-h-screen flex flex-col justify-between p-8 md:p-16 relative w-full h-full">
    <!-- Ambient glowing effect -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-secondary/10 blur-[120px] rounded-full pointer-events-none z-0"></div>
    
    <!-- Header -->
    <header class="relative z-10 w-full flex justify-between items-center text-primary">
      <div class="text-xl md:text-2xl font-serif italic tracking-tight uppercase">Century Capital</div>
      <div class="flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
        <span class="text-xs font-label uppercase tracking-widest text-on-surface-variant font-bold">System Update</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="relative z-10 flex flex-col items-center justify-center text-center my-auto">
      <h1 class="text-5xl md:text-8xl font-serif text-white mb-6 leading-none">
        Crafting the <br/><span class="italic text-primary">Future.</span>
      </h1>
      <p class="max-w-xl text-on-surface-variant md:text-lg mb-12">
        We are actively rebuilding our digital presence to showcase our full suite of web, application, and system capabilities. 
      </p>
      
      <div class="flex flex-col md:flex-row items-center justify-center gap-6">
        <a href="contact.html" class="bg-primary text-background px-10 py-4 font-label uppercase tracking-widest text-xs font-bold hover:bg-white transition-colors duration-300">Contact Us</a>
        <a href="home.html" class="border border-on-surface-variant/30 text-on-surface px-10 py-4 font-label uppercase tracking-widest text-xs font-bold hover:bg-surface transition-colors duration-300">View Client Portfolio Portal</a>
      </div>
    </main>

    <!-- Footer -->
    <footer class="relative z-10 w-full flex flex-col md:flex-row justify-between items-center gap-4 border-t border-on-surface-variant/10 pt-6">
      <p class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant">© 2026 Century Capital. Johannesburg, South Africa.</p>
      <div class="flex items-center gap-6 text-[10px] font-label uppercase tracking-widest text-on-surface-variant">
        <a href="#" class="hover:text-primary transition-colors">LinkedIn</a>
        <a href="#" class="hover:text-primary transition-colors">Twitter</a>
        <a href="#" class="hover:text-primary transition-colors">Instagram</a>
      </div>
    </footer>
  </div>

</body>
</html>
