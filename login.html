<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login | Century Capital</title>
<meta name="description" content="Century Capital admin login."/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,700;1,400;1,700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script id="tailwind-config">
  tailwind.config={darkMode:"class",theme:{extend:{colors:{"surface":"#fcf9f8","on-surface":"#1c1b1b","primary":"#000000","on-surface-variant":"#444748","surface-container-low":"#f6f3f2","outline-variant":"#c4c7c7","primary-container":"#1c1b1b","surface-container":"#f0eded","secondary-fixed-dim":"#e9c176","on-primary-container":"#858383","on-primary":"#ffffff","outline":"#747878","secondary":"#775a19","secondary-container":"#fed488","surface-container-highest":"#e5e2e1","background":"#fcf9f8","error":"#ba1a1a","error-container":"#ffdad6","on-error-container":"#93000a"},fontFamily:{"headline":["Newsreader","serif"],"body":["Manrope","sans-serif"],"label":["Manrope","sans-serif"]},borderRadius:{"DEFAULT":"0.125rem"}}}}
</script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-primary min-h-screen flex items-center justify-center p-8">
<div class="w-full max-w-md">
  <!-- Logo -->
  <div class="text-center mb-16">
    <a href="index.html" class="text-2xl font-serif font-bold tracking-tighter text-on-primary">CENTURY CAPITAL</a>
    <p class="font-label text-[10px] uppercase tracking-[0.3em] text-on-primary-container mt-2">Admin Portal</p>
  </div>

  <!-- Card -->
  <div class="bg-surface p-12">
    <div class="mb-10">
      <h1 class="font-headline italic text-4xl text-primary mb-2">Welcome back.</h1>
      <p class="text-on-surface-variant text-sm">Sign in to the Century Capital dashboard.</p>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)" class="space-y-8">
      <div>
        <label class="block font-label text-[10px] uppercase tracking-[0.2em] text-secondary mb-2">Email</label>
        <input id="login-email" type="email" required placeholder="admin@centurycapital.co.za"
          class="w-full bg-transparent border-0 border-b border-outline focus:ring-0 focus:border-secondary transition-colors py-3 text-lg font-headline placeholder:text-outline-variant/30"/>
      </div>
      <div>
        <label class="block font-label text-[10px] uppercase tracking-[0.2em] text-secondary mb-2">Password</label>
        <input id="login-password" type="password" required placeholder="••••••••"
          class="w-full bg-transparent border-0 border-b border-outline focus:ring-0 focus:border-secondary transition-colors py-3 text-lg font-headline placeholder:text-outline-variant/30"/>
      </div>

      <div id="login-error" class="hidden bg-error-container border-l-4 border-error p-4">
        <p class="text-on-error-container font-label text-xs uppercase tracking-widest">Invalid credentials. Please try again.</p>
      </div>

      <button id="login-btn" type="submit"
        class="w-full bg-primary text-on-primary py-4 font-label text-xs uppercase tracking-[0.2em] hover:bg-secondary transition-colors active:scale-95 flex items-center justify-center gap-3">
        <span id="btn-text">Sign In</span>
        <span class="material-symbols-outlined text-sm">arrow_forward</span>
      </button>
    </form>

    <div class="mt-8 pt-8 border-t border-outline-variant/20 text-center">
      <a href="index.html" class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant hover:text-secondary transition-colors">← Back to Site</a>
    </div>
  </div>

  <p class="text-center text-[10px] font-label uppercase tracking-widest text-on-primary-container opacity-40 mt-8">© 2026 Century Capital</p>
</div>

<script>
  const SUPABASE_URL = 'https://rlttjpreubmpmbvdntlh.supabase.co';
  const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY_HERE'; // Replace with your actual anon key

  let client;
  try {
    client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // Check if already logged in
    client.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'dashboard.html';
    });
  } catch(e) { console.log('Supabase not configured'); }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const btnText = document.getElementById('btn-text');
    const errorDiv = document.getElementById('login-error');
    errorDiv.classList.add('hidden');
    btnText.textContent = 'Signing in...';
    btn.disabled = true;

    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    if (!client || SUPABASE_ANON_KEY === 'YOUR_ANON_KEY_HERE') {
      // Demo mode: any login goes to dashboard
      window.location.href = 'dashboard.html';
      return;
    }

    const { error } = await client.auth.signInWithPassword({ email, password });
    if (error) {
      errorDiv.classList.remove('hidden');
      btnText.textContent = 'Sign In';
      btn.disabled = false;
    } else {
      window.location.href = 'dashboard.html';
    }
  }
</script>
</body>
</html>
